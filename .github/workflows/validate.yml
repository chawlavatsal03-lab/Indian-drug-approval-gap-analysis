name: Validate SQL and Python 
 
on: 
  push: 
    branches: [ main ] 
  workflow_dispatch: 
 
jobs: 
  validate: 
    runs-on: ubuntu-latest 
    steps: 
    - uses: actions/checkout@v3 
    - name: Set up Python 
      uses: actions/setup-python@v4 
      with: 
        python-version: '3.10' 
    - name: Install dependencies 
      run: pip install pandas duckdb 
    - name: Check files 
      run: ls -la 
